<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Questionnaire — Bron Technologies</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #07090a;
    --dark: #0c0f10;
    --card: #101416;
    --card2: #0c0f10;
    --border: #1d2326;
    --border-bright: #2a3236;
    --white: #eef2f1;
    --muted: #5d6669;
    --lime: #c3e51a;
    --lime-dim: rgba(195, 229, 26, 0.12);
    --lime-border: rgba(195, 229, 26, 0.4);
    --silver: #9aa3a6;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--void);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9000;
    opacity: 0.35;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 900px 600px at 50% -10%, rgba(195,229,26,0.05), transparent 60%),
      radial-gradient(ellipse 700px 500px at 90% 30%, rgba(154,163,166,0.04), transparent 60%);
    pointer-events: none;
    z-index: 1;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 500;
    padding: 22px 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(7,9,10,0.92);
    backdrop-filter: blur(20px) saturate(140%);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo::after {
    content: 'BRON TECHNOLOGIES';
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--muted);
    border-left: 1px solid var(--border);
    padding-left: 12px;
  }
  .nav-back {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--white);
    background: transparent;
    border: 1px solid var(--border);
    padding: 10px 20px;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
    font-weight: 500;
  }
  .nav-back:hover { border-color: var(--lime); color: var(--lime); }
  .nav-back::before { content: '‹ '; }

  /* PAGE */
  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 128px 16px 64px;
    position: relative;
    z-index: 2;
  }

  .status-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 12px; margin-bottom: 22px;
  }
  .status-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; }
  .pulse-dot { position: relative; display: inline-block; width: 8px; height: 8px; }
  .pulse-dot .ring { position: absolute; inset: 0; border-radius: 50%; background: var(--lime); animation: pulse 2s infinite; opacity: 0.4; }
  .pulse-dot .core { position: absolute; inset: 1px; border-radius: 50%; background: var(--lime); }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:0.4} 50%{transform:scale(2.2);opacity:0} }

  /* STEP NAV */
  .step-nav {
    width: 100%; max-width: 660px;
    display: flex; justify-content: space-between;
    margin-bottom: 22px; overflow-x: auto;
    padding: 0 2px;
  }
  .step-nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 60px; }
  .step-nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-bright); transition: all 0.3s; }
  .step-nav-dot.active, .step-nav-dot.done { background: var(--lime); box-shadow: 0 0 10px var(--lime-dim); }
  .step-nav-label { font-family: 'JetBrains Mono', monospace; font-size: 7px; font-weight: 700; letter-spacing: 0.1em; text-align: center; color: var(--border-bright); transition: color 0.3s; }
  .step-nav-label.active { color: var(--lime); }
  .step-nav-label.done { color: var(--silver); }

  /* CARD */
  .card {
    width: 100%; max-width: 660px;
    background: var(--card); border: 1px solid var(--border-bright);
    border-radius: 14px; padding: 32px 30px 26px;
    box-shadow: 0 0 40px rgba(195,229,26,0.04), 0 32px 80px rgba(0,0,0,0.6);
    position: relative; overflow: hidden;
  }
  .dot-grid {
    position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(195,229,26,0.06) 1px, transparent 1px);
    background-size: 22px 22px;
  }

  .card-top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; position: relative; z-index: 1; }
  .stat-box { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; min-width: 80px; }
  .stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; color: var(--white); line-height: 1; }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.14em; margin-top: 3px; }
  .ring-wrap { position: relative; }
  .ring-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .ring-pct { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: var(--lime); }
  .live-badge {
    background: var(--lime-dim); border: 1px solid var(--lime-border);
    border-radius: 4px; padding: 6px 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; color: var(--lime);
    letter-spacing: 0.1em; display: flex; align-items: center; gap: 6px;
  }

  .card-title-row { position: relative; z-index: 1; margin-bottom: 4px; }
  .card-title { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; color: var(--white); margin-bottom: 4px; line-height: 1.1; letter-spacing: -0.01em; }
  .card-sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.16em; }

  .divider { height: 1px; background: var(--border); margin: 20px 0; position: relative; z-index: 1; }

  .questions { display: flex; flex-direction: column; gap: 24px; position: relative; z-index: 1; }

  .q-block { display: flex; flex-direction: column; gap: 9px; }
  .q-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.14em; display: flex; align-items: center; gap: 8px; }
  .opt-tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--border-bright); background: var(--dark); border-radius: 3px; padding: 2px 6px; }
  .multi-hint { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--border-bright); letter-spacing: 0.1em; margin-bottom: 8px; }

  .input, textarea.input {
    background: rgba(255,255,255,0.02); border: 1px solid var(--border-bright); border-radius: 6px;
    padding: 11px 13px; color: var(--white); font-size: 13px; font-family: 'Inter', sans-serif;
    outline: none; width: 100%; box-sizing: border-box; line-height: 1.5;
    transition: border-color 0.2s;
  }
  .input:focus { border-color: var(--lime); }
  textarea.input { height: 78px; resize: vertical; }

  .opts { display: flex; flex-wrap: wrap; gap: 6px; }
  .opt {
    background: transparent; border: 1px solid var(--border-bright);
    border-radius: 6px; padding: 9px 13px;
    color: var(--muted); font-size: 12px; font-family: 'Inter', sans-serif;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: all 0.15s; text-align: left; line-height: 1.4;
  }
  .opt:hover { border-color: var(--silver); color: var(--white); }
  .opt.on { background: var(--lime-dim); border-color: var(--lime-border); color: var(--white); }
  .opt-indicator { font-size: 12px; color: var(--border-bright); font-weight: 700; width: 12px; flex-shrink: 0; transition: color 0.15s; }
  .opt.on .opt-indicator { color: var(--lime); }

  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding-top: 22px; border-top: 1px solid var(--border); position: relative; z-index: 1; }
  .back-btn {
    background: transparent; border: 1px solid var(--border-bright);
    border-radius: 6px; padding: 12px 22px;
    color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.15s;
  }
  .back-btn:hover { border-color: var(--silver); color: var(--white); }
  .next-btn {
    background: var(--lime); border: none; border-radius: 6px;
    padding: 13px 30px; color: var(--void);
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
    cursor: pointer; box-shadow: 0 4px 24px rgba(195,229,26,0.25);
    transition: opacity 0.2s;
  }
  .next-btn[disabled] { opacity: 0.3; cursor: not-allowed; }

  .footer-note { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--border-bright); margin-top: 28px; letter-spacing: 0.16em; }

  /* SUCCESS */
  .success-icon-wrap {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--lime-dim); border: 2px solid var(--lime);
    display: flex; align-items: center; justify-content: center; margin: 0 auto;
  }
  .success-icon { color: var(--lime); font-size: 28px; font-weight: 700; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .summary-cell { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 13px 15px; text-align: left; }
  .summary-cell-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.14em; font-weight: 600; margin-bottom: 4px; }
  .summary-cell-value { font-size: 13px; color: var(--white); font-weight: 600; }
  .svc-tag { font-size: 10px; background: var(--lime-dim); border: 1px solid var(--lime-border); color: var(--lime); border-radius: 4px; padding: 3px 9px; letter-spacing: 0.04em; font-family: 'JetBrains Mono', monospace; }

  @media (max-width: 768px) {
    nav { padding: 18px 20px; }
    .logo::after { display: none; }
    .page { padding: 100px 14px 56px; }
    .card { padding: 24px 18px 20px; border-radius: 12px; }
    .card-title { font-size: 22px; }
    .step-nav { max-width: 100%; }
  }
</style>
</head>

      { id: "targetCustomer", type: "textarea", label: "IDEAL CUSTOMER PROFILE", placeholder: "e.g. Hobbyists aged 25–45, passionate about custom gear, willing to spend on their craft" },
      { id: "brandVibe", type: "multiselect", label: "BRAND PERSONALITY", options: ["Bold & edgy", "Friendly & approachable", "Professional & clean", "Creative & artistic", "Rugged & authentic", "Fun & playful", "Premium & exclusive", "Underground / niche", "Educational", "Inspiring"] },
      { id: "competitors", type: "textarea", label: "COMPETITORS OR BRANDS YOU ADMIRE", placeholder: "e.g. List a few brands whose look or feel you admire" },
      { id: "avoidStyle", type: "text", label: "WHAT TO AVOID IN YOUR MARKETING", placeholder: "e.g. No corporate tone, no stock photos, no cringe clichés" },
    ],
  },
  {
    id: "contact", label: "CONTACT", icon: "07",
    heading: "Contact & Deployment",
    sub: "EMAIL · PHONE · PREFERRED METHOD · TIMELINE",
    questions: [
      { id: "email", type: "text", label: "EMAIL ADDRESS", placeholder: "you@yourbusiness.com" },
      { id: "phone", type: "text", label: "PHONE NUMBER", placeholder: "e.g. 555-123-4567 (optional)" },
      { id: "bestTime", type: "select", label: "BEST TIME TO REACH YOU", options: ["Morning (8am – 12pm)", "Afternoon (12pm – 5pm)", "Evening (5pm – 8pm)", "Anytime", "Email only — don't call"] },
      { id: "contactMethod", type: "select", label: "PREFERRED CONTACT METHOD", options: ["Email", "Text / SMS", "Phone call", "Video call (Zoom, etc.)", "Any"] },
      { id: "referral", type: "select", label: "HOW DID YOU FIND BRON TECHNOLOGIES?", options: ["Google search", "Social media", "Referred by someone", "Saw an ad", "Already know the team", "Other"] },
    ],
  },
];

let step = 0;
let answers = {};
const R = 30, CIRC = 2 * Math.PI * R;

function renderStepNav() {
  const wrap = document.getElementById('stepNav');
  wrap.innerHTML = '';
  STEPS.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'step-nav-item';
    const dot = document.createElement('div');
    dot.className = 'step-nav-dot' + (i === step ? ' active' : i < step ? ' done' : '');
    const label = document.createElement('span');
    label.className = 'step-nav-label' + (i === step ? ' active' : i < step ? ' done' : '');
    label.textContent = s.label;
    item.appendChild(dot);
    item.appendChild(label);
    wrap.appendChild(item);
  });
}

function setRing(pct) {
  const fg = document.getElementById('ringFg');
  fg.setAttribute('stroke-dasharray', CIRC);
  fg.setAttribute('stroke-dashoffset', CIRC * (1 - pct / 100));
  document.getElementById('ringPct').textContent = pct + '%';
}

function canProceed() {
  const cur = STEPS[step];
  return cur.questions.every(q => {
    if (q.id === 'phone') return true;
    const v = answers[q.id];
    if (q.type === 'multiselect') return v && v.length > 0;
    return v && v.toString().trim() !== '';
  });
}

function updateNextBtn() {
  document.getElementById('nextBtn').disabled = !canProceed();
}

function renderStep() {
  const cur = STEPS[step];
  renderStepNav();
  document.getElementById('statusText').textContent = `7 SECTIONS · ${step} COMPLETE`;
  document.getElementById('stepIcon').textContent = cur.icon;
  document.getElementById('cardTitle').textContent = cur.heading;
  document.getElementById('cardSub').textContent = cur.sub;
  setRing(Math.round(((step + 1) / STEPS.length) * 100));
  document.getElementById('backBtn').style.display = step > 0 ? 'inline-block' : 'none';
  document.getElementById('nextBtn').textContent = step === STEPS.length - 1 ? 'SUBMIT ›' : 'CONTINUE ›';

  const qWrap = document.getElementById('questions');
  qWrap.innerHTML = '';
  cur.questions.forEach(q => qWrap.appendChild(renderQuestion(q)));
  updateNextBtn();
}

function renderQuestion(q) {
  const block = document.createElement('div');
  block.className = 'q-block';

  const label = document.createElement('label');
  label.className = 'q-label';
  label.textContent = q.label;
  if (q.id === 'phone') {
    const tag = document.createElement('span');
    tag.className = 'opt-tag';
    tag.textContent = 'OPTIONAL';
    label.appendChild(tag);
  }
  block.appendChild(label);

  if (q.type === 'text') {
    const input = document.createElement('input');
    input.className = 'input';
    input.placeholder = q.placeholder || '';
    input.value = answers[q.id] || '';
    input.addEventListener('input', e => { answers[q.id] = e.target.value; updateNextBtn(); });
    block.appendChild(input);
  } else if (q.type === 'textarea') {
    const ta = document.createElement('textarea');
    ta.className = 'input';
    ta.placeholder = q.placeholder || '';
    ta.value = answers[q.id] || '';
    ta.addEventListener('input', e => { answers[q.id] = e.target.value; updateNextBtn(); });
    block.appendChild(ta);
  } else if (q.type === 'select') {
    const opts = document.createElement('div');
    opts.className = 'opts';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.type = 'button';
      const on = answers[q.id] === opt;
      btn.className = 'opt' + (on ? ' on' : '');
      btn.innerHTML = `<span class="opt-indicator">${on ? '›' : '·'}</span>${opt}`;
      btn.addEventListener('click', () => { answers[q.id] = opt; renderStep(); });
      opts.appendChild(btn);
    });
    block.appendChild(opts);
  } else if (q.type === 'multiselect') {
    const hint = document.createElement('p');
    hint.className = 'multi-hint';
    hint.textContent = 'SELECT ALL THAT APPLY';
    block.appendChild(hint);
    const opts = document.createElement('div');
    opts.className = 'opts';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.type = 'button';
      const cur = answers[q.id] || [];
      const on = cur.includes(opt);
      btn.className = 'opt' + (on ? ' on' : '');
      btn.innerHTML = `<span class="opt-indicator">${on ? '✓' : '·'}</span>${opt}`;
      btn.addEventListener('click', () => {
        const arr = answers[q.id] || [];
        answers[q.id] = arr.includes(opt) ? arr.filter(o => o !== opt) : [...arr, opt];
        renderStep();
      });
      opts.appendChild(btn);
    });
    block.appendChild(opts);
  }

  return block;
}

const FORMSPREE_ENDPOINT = 'https://formspree.io/f/xojrnjwv';

async function submitAnswers() {
  const payload = {};
  Object.keys(answers).forEach(k => {
    const v = answers[k];
    payload[k] = Array.isArray(v) ? v.join(', ') : v;
  });
  payload._subject = `New Client Questionnaire — ${answers.businessName || 'Unknown Business'}`;

  const res = await fetch(FORMSPREE_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error('Submission failed');
}

function renderSuccess() {
  const services = answers.servicesWanted || [];
  const budget = answers.monthlyBudget || 'TBD';

  document.getElementById('stepNav').innerHTML = '';
  document.getElementById('statusText').textContent = 'SUBMISSION RECEIVED';

  const card = document.getElementById('formCard');
  card.style.textAlign = 'center';
  card.style.padding = '48px 36px';
  card.innerHTML = `
    <div class="dot-grid"></div>
    <div class="success-icon-wrap"><span class="success-icon">✓</span></div>
    <h2 class="card-title" style="margin-top:20px;margin-bottom:8px;font-size:32px;">Transmission received.</h2>
    <p style="color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:32px;letter-spacing:0.03em;font-family:'Inter',sans-serif;">
      Thanks, <span style="color:var(--lime);font-weight:700;">${answers.ownerName || 'operator'}</span>. We'll review your submission and return with a custom proposal within 24 hours.
    </p>
    <div class="summary-grid" id="summaryGrid"></div>
    <div id="serviceTagsWrap" style="text-align:left;margin-top:20px;"></div>
    <div style="margin-top:36px;padding:14px 0 0;border-top:1px solid var(--border);">
      <span style="font-size:10px;color:var(--border-bright);letter-spacing:0.14em;font-family:'JetBrains Mono',monospace;">BRON TECHNOLOGIES · A TECHNOLOGY HOLDING COMPANY</span>
    </div>
  `;

  const grid = document.getElementById('summaryGrid');
  [
    ['BUSINESS', answers.businessName || '—'],
    ['BUDGET', budget.split('—')[0].trim()],
    ['SERVICES', `${services.length} SELECTED`],
    ['CONTACT', answers.email || '—'],
  ].forEach(([k, v]) => {
    const cell = document.createElement('div');
    cell.className = 'summary-cell';
    cell.innerHTML = `<div class="summary-cell-label">${k}</div><div class="summary-cell-value">${v}</div>`;
    grid.appendChild(cell);
  });

  if (services.length > 0) {
    const wrap = document.getElementById('serviceTagsWrap');
    wrap.innerHTML = `<p class="q-label" style="margin-bottom:10px;">REQUESTED SERVICES</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${services.map(s => `<span class="svc-tag">${s}</span>`).join('')}
      </div>`;
  }
}

document.getElementById('backBtn').addEventListener('click', () => {
  if (step > 0) { step -= 1; renderStep(); }
});
document.getElementById('nextBtn').addEventListener('click', async () => {
  if (!canProceed()) return;
  if (step < STEPS.length - 1) { step += 1; renderStep(); return; }

  const btn = document.getElementById('nextBtn');
  btn.disabled = true;
  btn.textContent = 'SENDING...';
  try {
    await submitAnswers();
    renderSuccess();
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'SUBMIT ›';
    alert('Something went wrong sending your answers. Please try again or email us directly.');
  }
});

renderStep();
</script>
